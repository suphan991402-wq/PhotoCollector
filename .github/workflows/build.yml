name: Build APK

# สร้างไฟล์ .apk อัตโนมัติทุกครั้งที่อัปโค้ดขึ้น GitHub
# ถ้า push เป็น tag รูปแบบ v<versionCode> (เช่น v2) จะสร้าง GitHub Release แนบ apk ให้ด้วย
# เพื่อให้แอปที่ลงเครื่องแล้วเช็คอัพเดทเจอ (ดู UpdateChecker.kt)
on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:   # กดปุ่ม Run เองได้จากหน้า Actions

permissions:
  contents: write   # ต้องมีสิทธิ์นี้เพื่อสร้าง GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Decode debug signing keystore
        run: echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > app/debug.keystore

      - name: Build debug APK
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhotoCollector-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
